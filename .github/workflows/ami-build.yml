name: AMI Build

on:
  pull_request:
    paths:
      - 'packer/**'
      - '.github/workflows/ami-build.yml'
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_public:
        description: Publish the AMIs publicly
        required: true
        default: true
        type: boolean
      buildkit_version:
        description: BuildKit release to bake into the AMI
        required: true
        default: v0.28.0
        type: string

env:
  BUILD_REGION: us-east-1
  COPY_REGIONS: us-west-2,eu-west-1,eu-central-1,ap-southeast-1
  BUILDKIT_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.buildkit_version || 'v0.28.0' }}
  PUBLISH_PUBLIC: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_public || github.event_name == 'push' && 'true' || 'false' }}

permissions:
  contents: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-packer@main
        with:
          version: latest
      - run: scripts/validate-packer.sh --architecture both

  build-amd64:
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-packer@main
        with:
          version: latest
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PACKER_ROLE_ARN }}
          aws-region: ${{ env.BUILD_REGION }}
      - name: Build amd64 AMI and copy to all regions
        run: |
          packer init packer/forja-builder.pkr.hcl
          packer build \
            -var "region=${BUILD_REGION}" \
            -var "architecture=amd64" \
            -var "publish_public=${PUBLISH_PUBLIC}" \
            -var "buildkit_version=${BUILDKIT_VERSION}" \
            -var "commit_sha=${{ github.sha }}" \
            -var "copy_regions=[$(echo "${COPY_REGIONS}" | sed 's/\([^,]*\)/"\1"/g')]" \
            packer/forja-builder.pkr.hcl
      - name: Rename manifest
        run: cp packer/manifest.json packer/manifest-amd64.json
      - uses: actions/upload-artifact@v4
        with:
          name: packer-manifest-amd64
          path: packer/manifest-amd64.json

  build-arm64:
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-packer@main
        with:
          version: latest
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PACKER_ROLE_ARN }}
          aws-region: ${{ env.BUILD_REGION }}
      - name: Build arm64 AMI and copy to all regions
        run: |
          packer init packer/forja-builder.pkr.hcl
          packer build \
            -var "region=${BUILD_REGION}" \
            -var "architecture=arm64" \
            -var "publish_public=${PUBLISH_PUBLIC}" \
            -var "buildkit_version=${BUILDKIT_VERSION}" \
            -var "commit_sha=${{ github.sha }}" \
            -var "copy_regions=[$(echo "${COPY_REGIONS}" | sed 's/\([^,]*\)/"\1"/g')]" \
            packer/forja-builder.pkr.hcl
      - name: Rename manifest
        run: cp packer/manifest.json packer/manifest-arm64.json
      - uses: actions/upload-artifact@v4
        with:
          name: packer-manifest-arm64
          path: packer/manifest-arm64.json

  publish:
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          name: packer-manifest-amd64
          path: packer/

      - uses: actions/download-artifact@v4
        with:
          name: packer-manifest-arm64
          path: packer/

      - name: Generate AMI map
        run: |
          scripts/update-release-amis.sh \
            --manifest-amd64 packer/manifest-amd64.json \
            --manifest-arm64 packer/manifest-arm64.json

      - name: Build AMI summary JSON
        run: |
          jq -n \
            --argjson amd64 "$(cat packer/manifest-amd64.json)" \
            --argjson arm64 "$(cat packer/manifest-arm64.json)" \
            '{amd64: $amd64.builds[-1].artifact_id, arm64: $arm64.builds[-1].artifact_id}' \
            > packer/ami-summary.json
          cat packer/ami-summary.json

      - name: Commit updated AMI map
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add internal/release/amis.go
          if git diff --cached --quiet; then
            echo "No changes to amis.go"
          else
            git commit -m "Update release AMI map for ${{ github.ref_name }}"
            git push origin main
          fi

      - name: Attach AMI manifest to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            packer/ami-summary.json \
            --clobber
